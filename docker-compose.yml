services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: shawarma_city
      POSTGRES_USER: shawarma_user
      POSTGRES_PASSWORD: shawarma_pass
    ports:
      - "5432:5432"      # exposes PostgreSQL on localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists between restarts

volumes:
  postgres_data:
